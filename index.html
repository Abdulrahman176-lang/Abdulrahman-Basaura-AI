
<!DOCTYPE html>
<html>
<head>
<title>Abdulrahman Basaura AI</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding-top:50px;
}

h1{
color:gold;
font-size:45px;
}

#chatbox{
width:80%;
max-width:500px;
height:300px;
background:#111;
margin:auto;
padding:10px;
overflow:auto;
border-radius:10px;
border:1px solid gold;
text-align:left;
}

input{
width:70%;
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:white;
}
</style>
</head>

<body>

<h1>🤖 Abdulrahman Basaura AI</h1>

<div id="chatbox"></div>

<br><br>

<input type="text" id="userInput" placeholder="Ask me anything...">

<button onclick="sendMessage()">Send</button>

<script>
function sendMessage(){

let input = document.getElementById("userInput").value;

let chatbox = document.getElementById("chatbox");

if(input.trim() === ""){
return;
}

chatbox.innerHTML += "<p><b>You:</b> " + input + "</p>";

let reply = "I don't understand 😅";

if(input.toLowerCase().includes("hello")){
reply = "Hello Abdulrahman 👋";
}

else if(input.toLowerCase().includes("how are you")){
reply = "I am fine 🚀";
}

else if(input.toLowerCase().includes("who are you")){
reply = "I am Abdulrahman Basaura AI 🤖";
}

else if(input.toLowerCase().includes("name")){
reply = "Your name is Abdulrahman Basaura ❤️";
}

else if(input.toLowerCase().includes("bye")){
reply = "Goodbye Abdulrahman 👋";
}

chatbox.innerHTML += "<p><b>AI:</b> " + reply + "</p>";

document.getElementById("userInput").value = "";

chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
