
<script>

async function sendMessage(){

let input = document.getElementById("userInput").value;

if(input.trim() === "") return;

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += `
<div class="message user">
<b>You:</b> ${input}
</div>
`;

document.getElementById("userInput").value = "";

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=SAKA_API_KEY_A_NAN",
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [{
parts: [{
text: "You are Abdulrahman Basaura AI. Reply intelligently in any language the user speaks. Answer questions clearly like ChatGPT. Be smart, friendly, respectful and modern. Abdulrahman Basaura is from Basaura town under Jega Local Government, Kebbi State, Nigeria. His neighborhood is Kade Area Basaura. His father's name was Mu'azu Aliyu. He died in a road accident on the road between Basaura and Kalgo when Abdulrahman was still young. His mother's name was Aisha Muhammad. She died after an illness while Abdulrahman was still young. His siblings are Sani, Abubakar, Umar, Usman, Aliyu, Fatima, Aisha and Nafsa. His closest friends in Basaura are Salim Sani and Sa'adu Salisu. Always reply politely, intelligently and naturally like a modern AI assistant. User message: " + input
}]
}]
})
}
);

const data = await response.json();

let reply =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "Sorry, I could not understand.";

chatbox.innerHTML += `
<div class="message ai">
<b>AI:</b> ${reply}
</div>
`;

speak(reply);

chatbox.scrollTop = chatbox.scrollHeight;
}

function speak(text){

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

</script>
