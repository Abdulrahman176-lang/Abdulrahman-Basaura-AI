
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abdulrahman Basaura AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0d1117;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:700px;
background:#161b22;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,215,0,0.2);
text-align:center;
}

h1{
color:gold;
margin-bottom:20px;
}

#chatbox{
height:350px;
overflow-y:auto;
background:#0d1117;
padding:15px;
border-radius:15px;
border:1px solid gold;
text-align:left;
margin-bottom:15px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:10px;
}

.user{
background:#21262d;
}

.ai{
background:#30363d;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:gold;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 Abdulrahman Basaura AI</h1>

<div id="chatbox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask me anything...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const API_KEY = "AIzaSyDOOmsK5R1-rgSvVjQS2JsNp8lYB657qeM";

async

async function sendMessage(){

let input = document.getElementById("userInput").value;

if(input.trim() === "") return;

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += `
<div class="message user">
<b>You:</b> ${input}
</div>
`;

document.getElementById("userInput").value = "";

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [{
parts: [{
text: "You are Abdulrahman Basaura AI. Reply intelligently in any language the user speaks. Answer questions clearly like ChatGPT. Be smart, friendly and respectful. Abdulrahman Basaura is from Basaura town under Jega Local Government, Kebbi State, Nigeria. User message: " + input
}]
}]
})
}
);

const data = await response.json();

let reply =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "Sorry, I could not understand.";

chatbox.innerHTML += `
<div class="message ai">
<b>AI:</b> ${reply}
</div>
`;

speak(reply);

chatbox.scrollTop = chatbox.scrollHeight;
}

function speak(text){

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

</script>

</body>
</html>
