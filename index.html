!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdulrahman Basaura AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d0d0d;
            color: #ececec;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid #404040;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00d4ff, #00a8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.85rem;
            color: #999;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #1a1a1a;
            border: 1px solid #404040;
            color: #ececec;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            background: #2d2d2d;
            border-color: #00d4ff;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chatbox-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .chatbox-container::-webkit-scrollbar {
            width: 8px;
        }

        .chatbox-container::-webkit-scrollbar-track {
            background: #0d0d0d;
        }

        .chatbox-container::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        .chatbox-container::-webkit-scrollbar-thumb:hover {
            background: #505050;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: slideIn 0.3s ease-out;
            max-width: 90%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #00d4ff, #00a8ff);
            color: #0d0d0d;
        }

        .message.bot .message-avatar {
            background: #1a1a1a;
            border: 2px solid #00d4ff;
            color: #00d4ff;
        }

        .message-content {
            background: #1a1a1a;
            border: 1px solid #404040;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #00d4ff, #00a8ff);
            color: #0d0d0d;
            border: none;
            font-weight: 500;
        }

        .message.bot .message-content {
            background: #1a1a1a;
            color: #ececec;
            border: 1px solid #404040;
        }

        .loading {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4ff;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-section {
            background: #1a1a1a;
            border-top: 1px solid #404040;
            padding: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 0.5rem;
            background: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 12px;
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #ececec;
            outline: none;
            font-size: 1rem;
            padding: 0.5rem;
            max-height: 100px;
            resize: none;
            font-family: inherit;
        }

        #userInput::placeholder {
            color: #666;
        }

        .send-btn {
            background: linear-gradient(135deg, #00d4ff, #00a8ff);
            border: none;
            color: #0d0d0d;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 100px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .api-notice {
            text-align: center;
            padding: 1rem;
            background: #1a1a1a;
            border: 1px solid #404040;
            border-radius: 8px;
            margin: 1rem;
            color: #999;
            font-size: 0.9rem;
        }

        .api-notice strong {
            color: #00d4ff;
        }

        /* Light Mode */
        body.light-mode {
            background: #f5f5f5;
            color: #333;
        }

        body.light-mode .header {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            border-bottom-color: #e0e0e0;
        }

        body.light-mode .header h1 {
            background: linear-gradient(135deg, #0084ff, #0066cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.light-mode .header p {
            color: #666;
        }

        body.light-mode .theme-toggle {
            background: #fff;
            border-color: #e0e0e0;
            color: #333;
        }

        body.light-mode .theme-toggle:hover {
            border-color: #0084ff;
            background: #f9f9f9;
        }

        body.light-mode .chatbox-container {
            background: #f5f5f5;
        }

        body.light-mode .chatbox-container::-webkit-scrollbar-track {
            background: #f5f5f5;
        }

        body.light-mode .chatbox-container::-webkit-scrollbar-thumb {
            background: #ddd;
        }

        body.light-mode .chatbox-container::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }

        body.light-mode .message-content {
            background: #e8e8e8;
            color: #333;
            border-color: #ddd;
        }

        body.light-mode .message.user .message-content {
            background: linear-gradient(135deg, #0084ff, #0066cc);
            color: white;
            border: none;
        }

        body.light-mode .message-avatar {
            background: #e8e8e8;
            color: #333;
            border: 2px solid #e8e8e8;
        }

        body.light-mode .message.user .message-avatar {
            background: linear-gradient(135deg, #0084ff, #0066cc);
            color: white;
        }

        body.light-mode .message.bot .message-avatar {
            background: #fff;
            border-color: #0084ff;
            color: #0084ff;
        }

        body.light-mode .input-section {
            background: #fff;
            border-top-color: #e0e0e0;
        }

        body.light-mode .input-wrapper {
            background: #f0f0f0;
            border-color: #ddd;
        }

        body.light-mode .input-wrapper:focus-within {
            border-color: #0084ff;
            box-shadow: 0 0 12px rgba(0, 132, 255, 0.2);
        }

        body.light-mode #userInput {
            color: #333;
        }

        body.light-mode #userInput::placeholder {
            color: #999;
        }

        body.light-mode .send-btn {
            background: linear-gradient(135deg, #0084ff, #0066cc);
        }

        body.light-mode .send-btn:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(0, 132, 255, 0.4);
        }

        body.light-mode .api-notice {
            background: #fff;
            border-color: #e0e0e0;
            color: #666;
        }

        body.light-mode .api-notice strong {
            color: #0084ff;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .message {
                max-width: 95%;
            }

            .chatbox-container {
                padding: 1rem 0.5rem;
                gap: 0.75rem;
            }

            .input-section {
                padding: 0.75rem;
                gap: 0.5rem;
            }

            .send-btn {
                padding: 0.65rem 1rem;
                font-size: 0.9rem;
                min-width: 80px;
            }

            .theme-toggle {
                padding: 0.4rem 0.8rem;
                font-size: 1rem;
            }

            .message-avatar {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }

            .message-content {
                padding: 0.65rem 0.85rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .header p {
                font-size: 0.75rem;
            }

            .chatbox-container {
                padding: 0.75rem 0.5rem;
            }

            .message {
                max-width: 100%;
            }

            .input-section {
                padding: 0.5rem;
                flex-direction: column;
            }

            .send-btn {
                width: 100%;
            }

            .api-notice {
                margin: 0.5rem;
                font-size: 0.8rem;
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
    
    <div class="container">
        <div class="header">
            <h1>🤖 Abdulrahman Basaura AI</h1>
            <p>Modern AI Assistant - Powered by Gemini</p>
        </div>

        <div class="chatbox-container" id="chatbox"></div>

        <div class="api-notice" id="apiNotice">
            ⚠️ Please set your <strong>Google Gemini API Key</strong> in the browser console:
            <br>
            <code style="background: #2d2d2d; padding: 0.25rem 0.5rem; border-radius: 4px; margin-top: 0.5rem; display: inline-block;">
                window.GEMINI_API_KEY = 'your-api-key-here'
            </code>
        </div>

        <div class="input-section">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="Ask me anything... (Shift+Enter for new line, Enter to send)"
                    rows="1"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
                <span id="sendBtnText">Send</span>
                <span id="sendBtnIcon">↓</span>
            </button>
        </div>
    </div>

    <script>
        // AIzaSyAiYTqbg3-jpJFsGkn0FBHH90K4hlzF8gU';
        const API_ENDPOINT = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
        const CHAT_HISTORY = [];
        const MAX_MESSAGES = 50;

        // DOM Elements
        const chatbox = document.getElementById('chatbox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const themeToggle = document.getElementById('themeToggle');
        const apiNotice = document.getElementById('apiNotice');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            setupEventListeners();
            addWelcomeMessage();
            checkApiKey();
        });

        // Theme Management
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.textContent = '☀️';
            }
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
        });

        // Event Listeners
        function setupEventListeners() {
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            userInput.addEventListener('input', () => {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
            });

            sendBtn.addEventListener('click', sendMessage);
        }

        // Check API Key
        function checkApiKey() {
            if (window.GEMINI_API_KEY) {
                GEMINI_API_KEY = window.GEMINI_API_KEY;
                apiNotice.style.display = 'none';
            } else {
                apiNotice.style.display = 'block';
            }
        }

        // Monitor for API key in console
        setInterval(() => {
            if (window.GEMINI_API_KEY && !GEMINI_API_KEY) {
                GEMINI_API_KEY = window.GEMINI_API_KEY;
                apiNotice.style.display = 'none';
            }
        }, 1000);

        // Welcome Message
        function addWelcomeMessage() {
            const welcome = document.createElement('div');
            welcome.className = 'message bot';
            welcome.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <strong>Welcome!</strong> I'm Abdulrahman Basaura AI. I can help you with questions, creative writing, coding, and much more. Let's chat! 👋
                </div>
            `;
            chatbox.appendChild(welcome);
            scrollToBottom();
        }

        // Send Message
        async function sendMessage() {
            const input = userInput.value.trim();

            if (!input) return;
            if (!GEMINI_API_KEY) {
                showError('Please set your API key first. Use: window.GEMINI_API_KEY = "your-key"');
                return;
            }

            // Disable send button
            sendBtn.disabled = true;

            // Add user message
            addMessage(input, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            CHAT_HISTORY.push({ role: 'user', content: input });

            // Show loading
            const loadingId = showLoading();

            try {
                const response = await fetch(`${API_ENDPOINT}?key=${encodeURIComponent(GEMINI_API_KEY)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: input
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                // Remove loading
                removeLoading(loadingId);

                // Get reply
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 
                    'Sorry, I couldn\'t generate a response. Please try again.';

                addMessage(reply, 'bot');
                CHAT_HISTORY.push({ role: 'assistant', content: reply });

                // Limit chat history
                if (CHAT_HISTORY.length > MAX_MESSAGES) {
                    CHAT_HISTORY.splice(0, 2);
                }

            } catch (error) {
                removeLoading(loadingId);
                console.error('Error:', error);
                
                let errorMessage = 'Connection error. Please check your API key and try again.';
                
                if (error.message.includes('401')) {
                    errorMessage = 'Invalid API key. Please verify your key.';
                } else if (error.message.includes('429')) {
                    errorMessage = 'Too many requests. Please wait a moment before trying again.';
                } else if (error.message.includes('500')) {
                    errorMessage = 'Server error. Please try again later.';
                }
                
                addMessage(errorMessage, 'bot', true);
            }

            // Enable send button
            sendBtn.disabled = false;
            userInput.focus();
        }

        // Add Message to Chat
        function addMessage(text, sender, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = sender === 'user' ? '👤' : '🤖';
            const avatarClass = sender === 'user' ? 'message-avatar' : 'message-avatar';
            
            messageDiv.innerHTML = `
                <div class="${avatarClass}">${avatar}</div>
                <div class="message-content ${isError ? 'error' : ''}">${escapeHtml(text)}</div>
            `;
            
            chatbox.appendChild(messageDiv);
            scrollToBottom();
        }

        // Loading Animation
        function showLoading() {
            const loadingId = 'loading-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = loadingId;
            messageDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="loading">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
            `;
            chatbox.appendChild(messageDiv);
            scrollToBottom();
            return loadingId;
        }

        function removeLoading(id) {
            const loading = document.getElementById(id);
            if (loading) loading.remove();
        }

        // Error Message
        function showError(message) {
            addMessage(message, 'bot', true);
        }

        // Scroll to Bottom
        function scrollToBottom() {
            setTimeout(() => {
                chatbox.scrollTop = chatbox.scrollHeight;
            }, 0);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial API check on load
        window.addEventListener('load', checkApiKey);
    </script>
</body>
</html>
